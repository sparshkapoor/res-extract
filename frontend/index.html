<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no"
    />
    <title>res-extract</title>

    <meta name="description" content="Turn cooking Shorts and Reels into step-by-step recipes." />
    <meta name="theme-color" content="#0a0a0b" />

    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" href="/icons/icon-180.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Fraunces requested as a true variable font (opsz+wght as continuous
         ranges, not fixed instances) so the display-xl type step (see
         index.css/DESIGN.md) can opt into the optical-size axis — Fraunces
         is drawn differently at large display sizes vs. body-text sizes,
         and that only works if the font-face itself exposes `opsz` as a
         range instead of being pinned to Google's default per weight. -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&display=swap"
      rel="stylesheet"
    />

    <!-- iOS PWA: hide Safari chrome, run standalone from the home screen -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="res-extract" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
