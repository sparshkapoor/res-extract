# Single service, intentionally: nginx only. Everything hardware-dependent
# (Ollama, mlx-whisper, mlx-vlm, ocrmac, ffmpeg, yt-dlp) runs bare-metal on
# the host via launchd (see deploy/launchd/), reached from here through
# host.lima.internal. Do not add a backend/app service to this file — that
# would silently reintroduce the exact Docker-on-Apple-Silicon problem this
# architecture works around.
services:
  nginx:
    build: .
    ports:
      # Pick a free host port -- check `docker ps` first if this machine
      # runs other projects, since 8080 is a common default that may
      # already be taken.
      - "8090:80"
    volumes:
      # Directory bind-mounts are reliable under Colima's virtiofs; only the
      # single-file nginx.conf mount was problematic, so that's baked into
      # the image instead (see Dockerfile) rather than mounted here.
      - ../../frontend/dist:/usr/share/nginx/html:ro
    restart: unless-stopped
