# Runs inside the Colima container. Its ONLY job is serving the built
# frontend and reverse-proxying /api and /media to the bare-metal FastAPI
# process on the host — nothing hardware-dependent (Ollama, mlx-whisper,
# mlx-vlm, ocrmac) may run in here. See deploy/colima/docker-compose.yml
# and the repo's plan file for why.

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;

    server {
        listen 80;
        server_name _;

        # Built frontend static files (bind-mounted, see docker-compose.yml)
        root /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }

        # host.lima.internal is Lima's DNS name for the bare-metal host —
        # this is where the actual FastAPI/uvicorn process listens (:8000).
        location /api/ {
            proxy_pass http://host.lima.internal:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

            # SSE requires unbuffered, non-chunked streaming all the way
            # through — without these, progress events queue up and arrive
            # in one burst instead of live.
            proxy_buffering off;
            proxy_cache off;
            proxy_set_header Connection "";
            proxy_http_version 1.1;
            proxy_read_timeout 3600s;
        }

        location /media/ {
            proxy_pass http://host.lima.internal:8000;
            proxy_set_header Host $host;
        }
    }
}
